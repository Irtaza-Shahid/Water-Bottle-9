<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AquaFlow — Pure Hydration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

    <style>
      :root {
        --ocean: #0a4f6e;
        --wave: #1a8fa8;
        --foam: #d4f1f9;
        --sand: #f5efe6;
        --coral: #e8614a;
        --dark: #091c24;
        --light: #fafdff;
      }
 
      * { box-sizing: border-box; margin: 0; padding: 0; }
       
      body {
        font-family: 'DM Sans', sans-serif;
        background-color: var(--light);
        color: var(--dark);
        overflow-x: hidden;
      }

      /* ── NAVBAR ── */
      nav {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 1000;
        padding: 18px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(10,79,110,0.1);
      }
 
      .nav-logo {
        font-family: 'Playfair Display', serif;
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--ocean);
        letter-spacing: -0.5px;
        text-decoration: none;
      }
 
      .nav-logo span { color: var(--wave); }
 
      .nav-links { list-style: none; display: flex; gap: 32px; }
      .nav-links a {
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--dark);
        letter-spacing: 0.5px;
        transition: color 0.2s;
      }
      .nav-links a:hover { color: var(--wave); }
 
      .nav-cta {
        background: var(--ocean);
        color: white !important;
        padding: 8px 22px;
        border-radius: 50px;
        transition: background 0.2s !important;
      }
      .nav-cta:hover { background: var(--wave) !important; color: white !important; }
 
      .nav-hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
      }
      .nav-hamburger span {
        display: block;
        width: 25px;
        height: 2px;
        background: var(--ocean);
        border-radius: 2px;
      }

       /* ── HERO ── */
    .hero {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--ocean) 0%, #0d6e8a 50%, var(--wave) 100%);
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding-top: 80px;
    }
 
    .hero::before {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 120px;
      background: var(--light);
      clip-path: ellipse(55% 100% at 50% 100%);
    }
 
    .hero-bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      animation: float 6s ease-in-out infinite;
    }
    .hero-bubble:nth-child(1) { width:350px; height:350px; top:-80px; right:-80px; animation-delay:0s; }
    .hero-bubble:nth-child(2) { width:200px; height:200px; bottom:150px; left:-60px; animation-delay:2s; }
    .hero-bubble:nth-child(3) { width:100px; height:100px; top:40%; right:30%; animation-delay:4s; }
 
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-20px); }
    }
 
    .hero-text { position: relative; z-index: 2; }
 
    .hero-eyebrow {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--foam);
      margin-bottom: 16px;
    }
 
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 900;
      line-height: 1.05;
      color: white;
      margin-bottom: 24px;
    }
 
    .hero-title em {
      font-style: italic;
      color: #a8e6f5;
    }
 
    .hero-desc {
      font-size: 1.05rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.75);
      max-width: 440px;
      margin-bottom: 40px;
    }
 
    .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; }
 
    .btn-primary-custom {
      background: white;
      color: var(--ocean);
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .btn-primary-custom:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.2);
      color: var(--wave);
    }
 
    .btn-outline-custom {
      background: transparent;
      color: white;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 500;
      font-size: 0.95rem;
      border: 1.5px solid rgba(255,255,255,0.5);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-outline-custom:hover {
      border-color: white;
      background: rgba(255,255,255,0.12);
      color: white;
    }

    /* Bottle image area */
    .hero-bottle {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
    }
 
    .bottle-svg-wrap {
      position: relative;
      animation: floatBottle 4s ease-in-out infinite;
    }
 
    @keyframes floatBottle {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50%       { transform: translateY(-18px) rotate(2deg); }
    }
 
    .bottle-glow {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 40px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      filter: blur(12px);
    }
 
    /* SVG Bottle */
    .bottle-svg { width: 220px; filter: drop-shadow(0 30px 60px rgba(0,0,0,0.3)); }
   
     /* ── STATS BAR ── */
    .stats-bar {
      background: var(--ocean);
      padding: 30px 0;
    }
 
    .stat-item {
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.15);
      padding: 10px 20px;
    }
    .stat-item:last-child { border-right: none; }
 
    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #a8e6f5;
      line-height: 1;
    }
 
    .stat-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.65);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }

      /* ── FEATURES ── */
    .section-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--wave);
      margin-bottom: 12px;
    }
 
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      line-height: 1.15;
      color: var(--dark);
      margin-bottom: 20px;
    }
 
    .feature-card {
      background: white;
      border-radius: 20px;
      padding: 36px 30px;
      height: 100%;
      border: 1px solid rgba(10,79,110,0.08);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }
 
    .feature-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, var(--wave), var(--ocean));
      border-radius: 4px 0 0 4px;
    }
 
    .feature-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(10,79,110,0.12);
    }
 
    .feature-icon {
      width: 56px;
      height: 56px;
      background: var(--foam);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 20px;
    }
 
    .feature-card h5 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--ocean);
      margin-bottom: 10px;
    }
 
    .feature-card p {
      font-size: 0.92rem;
      line-height: 1.75;
      color: #5a7080;
    }
  
   </style>
</head>
<body>

     <!-- NAVBAR -->
  <nav>
    <a class="nav-logo" href="#">Aqua<span>Flow</span></a>
    <ul class="nav-links">
      <li><a href="#features">Features</a></li>
      <li><a href="#products">Products</a></li>
      <li><a href="#reviews">Reviews</a></li>
      <li><a href="#" class="nav-cta">Shop Now</a></li>
    </ul>
    <div class="nav-hamburger">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bubble"></div>
    <div class="hero-bubble"></div>
    <div class="hero-bubble"></div>
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-6 hero-text">
          <p class="hero-eyebrow">Crafted for the active life</p>
          <h1 class="hero-title">
            Hydration,<br/>
            <em>Reimagined.</em>
          </h1>
          <p class="hero-desc">
            Premium stainless steel water bottles that keep your drink ice-cold for 24 hours or piping hot for 12. Designed for adventurers, built to last a lifetime.
          </p>
          <div class="hero-btns">
            <a href="#products" class="btn-primary-custom">Shop Collection</a>
            <a href="#features" class="btn-outline-custom">Learn More</a>
          </div>
        </div>
        <div class="col-lg-6 hero-bottle">
          <div class="bottle-svg-wrap">
            <!-- SVG Water Bottle -->
            <svg class="bottle-svg" viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg">

                
    
</body>
</html>
